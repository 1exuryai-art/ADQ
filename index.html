<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой мини сайт</title>
  <style>
    body{
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f0f4ff;
      color: #1e293b;
    }
    header{
      text-align: center;
      padding: 40px 20px 32px;
      background: linear-gradient(160deg, #2563eb, #7c3aed);
      color: white;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    nav a {
      color: white;
      text-decoration: none;
      paddinng: 10px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    nav a:hover {
      background: rgba(255, 255, 255, 0.3);
    }
      
  </style>
</head>
<body>
  <header>
    <h1>Я учу html</h1>
    <nav>
      <a href="#about">Обо мне</a>
      <a href="#plan">План</a>
    </nav>
  </header>
   <main>
    <section>
      <form action="/send" method="post">
        <label>
          Имя:
          <input type="text" name="name">
        </label>

        <label>
          Email:
          <input type="email" name="email">
        </label>

        <button type="submit">Отправить</button>

      </form>

    </section>
    
    <section id="about">
      <h2>Обо мне</h2>
      <p>Пробую <strong>ВЕБ</strong></p>
    </section>

    <section id="plan">
      <h2>Мой план</h2>
      <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>Java script</li>
      </ol>
    </section>
  </main>

  <footer>
    <p>Урок 1 - HTML <strong>база</strong></p>
  </footer>
</body>
</html>
