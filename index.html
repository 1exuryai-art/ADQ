<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой мини сайт</title>
  <style>
    body{
      margin: 0;
      font-family: "arial black", sans-serif;
      background: #f0f4ff;
      color: #1e293b;
    }
    header{
      text-align: center;
      padding: 40px 20px 32px;
      background: linear-gradient(160deg, #2563eb, #7c3aed);
      color: white;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    nav a:hover {
      background: rgba(23, 142, 166, 0.3);
      transform: translateY(-7px);
      transition: ease 0.2s;
    }

    main {
      max-width: 640px;
      margin: -20px auto 40px;
      padding: 0 20px;
      display: grid;
      gap: 20px;
    }
      
    section {
      background: white;
      padding: 28px 32px;
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(15, 23, 42, 0.90);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    section h2 {
      margin: 0 0 12px;
      color: #2563eb;
    }

    section strong {
      color: #7c3aed;
    }

    footer {
      text-align: center;
      padding: 24px 20px 40px;
      color: #64748b;
      font-size: 14px;
    }

    footer strong {
      color: #2563eb;
    }

    form button {
      padding: 10px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;  /*это тоже тестануть*/
      margin-top: 34px;  /*потом потестить что это*/
      transition: 0.2s ease; 
    }

    form button:hover {
      background: #A617A6;
      transform: translateY(-7px); /*от чего зависит?*/
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }

    form label {
      display: block;
      margin-bottom: 12px;
    }

    form input {
      display: block;
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      max-width: 280px;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
    }
    
    #about img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #7c3aed;
      margin: 12px 0;
      object-fit: cover
    }
    
    #about img {
      transition: 0.3s ease;
    }

    #about img:hover {
      transform: translateY(-20px) scale(1.1);
      border-color: #2563eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th {
      border: 3px solid #cbd5e1;
      padding: 10px 14px;
      text-align: left;
      transform: scale(1);
    }
      
    td {
      border: 1px solid #cbd5e1;
      padding: 10px 14px;
      text-align: left;
      transform: scale(1);
    }
      
    td:hover {
      color: green;
      transition: 0.3s ease;
      transform: scale(1.3);
    }
      

    th:hover {
      background: #2563eb;
      color: pink;
      transition: 0.3s ease;
      transform: scale(1.3);
    }

    tr:nth-child(even) {
      background: #f8fafc;
    }
      
  
  </style>
</head>
<body>
  <header>
    <h1>Я учу html</h1>
    <nav>
      <a href="#about">Обо мне</a>
      <a href="#plan">План</a>
      <a href="#first-button">Первая кнопка!</a>
      <a href="#progress">Прогресс</a>
    </nav>
  </header>
   <main>
    <section>
      <form action="/send" method="post">
        <label>
          Имя:
          <input type="text" name="name">
        </label>

        <label>
          Email:
          <input type="email" name="email">
        </label>

        <button type="submit">Отправить</button>

      </form>

    </section>
    
    <section id="about">
      <h2>Обо мне</h2>
      <img src="naruto-ultimate-3840x2160-24976.png" alt="Наруто">
      <p>Пробую <strong>ВЕБ</strong></p>
    </section>

    <section id="plan">
      <h2>Мой план</h2>
      <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>Java script</li>
      </ol>
    </section>

    <section id="progress">
      <h2>Мой прогресс</h2>

      <table>
        <tr>
        <th>Урок</th>
        <th>Статус</th>
        </tr>
        <tr>
          <td>HTML</td>
          <td>СДАЛ</td>
        </tr>
        <tr>
          <td>CSS</td>
          <td>УЧУ</td>
        </tr>
        <tr>
          <td>Java Script</td>
          <td>Скоро</td>
        </tr>
      </table>
    </section>
  </main>

  <footer>
    <p>Урок 1 - HTML <strong>база</strong></p>
  </footer>
</body>
</html>
